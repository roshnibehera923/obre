<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>OBRE — The Occasion Edit</title>
    <script>
      // SPA redirect: encode the requested path into a query param so index.html
      // can restore it via history.replaceState before React Router initialises.
      // pathSegmentsToKeep=1 preserves the repo-name segment in the URL.
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
